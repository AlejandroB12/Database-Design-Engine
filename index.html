  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

  <style>
    body { font-family: 'Segoe UI', system-ui, -apple-system, sans-serif; }

    ::-webkit-scrollbar-track { background: #161b22; }

    .sql-editor-wrapper ::-webkit-scrollbar-track { background: #0d1117; border-radius: 7px; border: 2px solid #161b22; }
    .sql-editor-wrapper ::-webkit-scrollbar-thumb { background: linear-gradient(180deg, #30363d, #21262d); border-radius: 7px; border: 2px solid transparent; background-clip: padding-box; }
    .sql-editor-wrapper ::-webkit-scrollbar-thumb:hover { background: linear-gradient(180deg, #484f58, #30363d); border: 2px solid transparent; background-clip: padding-box; }

    }

    .sql-editor-wrapper textarea,
    .sql-editor-wrapper pre {
      margin: 0; border: 0; padding: 16px; font: inherit; line-height: inherit; letter-spacing: inherit;
      word-break: break-all; white-space: pre-wrap; position: absolute; top: 0; left: 0; width: 100%; height: 100%; overflow: auto;
    }
    .sql-editor-wrapper pre { z-index: 1; color: #c9d1d9; pointer-events: none; background: transparent; }
    .sql-editor-wrapper textarea { z-index: 2; color: transparent; caret-color: #c9d1d9; background: transparent; resize: none; }
    .sql-editor-wrapper textarea::placeholder { color: #6e7681; }
    .sql-editor-wrapper textarea:focus { outline: none; }
    .sql-keyword { color: #ff7b72; }
    .sql-string { color: #a5d6ff; }
    .sql-number { color: #79c0ff; }
    .sql-comment { color: #8b949e; font-style: italic; }
    .sql-backtick { color: #79c0ff; }
    .sql-operator { color: #ff7b72; }
    .table-card.dragging { z-index: 100; box-shadow: 0 16px 48px rgba(0,0,0,0.6), 0 4px 12px rgba(0,0,0,0.4), inset 0 1px 0 rgba(255,255,255,0.08) !important; transform: translateY(-2px); }
    .diagram-svg { pointer-events: none; }

    .diagram-svg line { cursor: pointer; }

  </style>
</head>
<body class="bg-[#0d1117] text-[#c9d1d9]">
  <div id="root"></div>
  <script src="routes/utils.js"></script>
  <script src="routes/parser.js"></script>
  <script src="routes/generators.js"></script>
  <script src="routes/layout.js"></script>
  <script src="routes/export.js"></script>
  <script type="text/babel">
const { useState, useCallback, useMemo, useRef, useEffect } = React;

function midpoint(p1, p2) { return { x: (p1.x + p2.x) / 2, y: (p1.y + p2.y) / 2 }; }

function closestOnRect(px, py, rx, ry, rw, rh) {
  const left = rx, right = rx + rw, top = ry, bottom = ry + rh;
  const cx = Math.max(left, Math.min(right, px));
  const cy = Math.max(top, Math.min(bottom, py));
  if (cx === px && cy === py) {
    const dl = px - left, dr = right - px, dt = py - top, db = bottom - py;
    const min = Math.min(dl, dr, dt, db);
    if (min === dl) return { x: left, y: cy };
    if (min === dr) return { x: right, y: cy };
    if (min === dt) return { x: cx, y: top };
    return { x: cx, y: bottom };
  }
  if (px < left) { if (py < top) return { x: left, y: top }; if (py > bottom) return { x: left, y: bottom }; return { x: left, y: py }; }
  if (px > right) { if (py < top) return { x: right, y: top }; if (py > bottom) return { x: right, y: bottom }; return { x: right, y: py }; }
  if (py < top) return { x: px, y: top };
  return { x: px, y: bottom };
}

function snapEndpoints(points, lineKey, tables, positions, dims) {
  if (points.length < 2) return points;
  const d1 = lineKey.indexOf('-'); if (d1 === -1) return points;
  const srcId = lineKey.substring(0, d1);
  const rest = lineKey.substring(d1 + 1); const d2 = rest.indexOf('-'); if (d2 === -1) return points;
  const refTbl = rest.substring(d2 + 1);
  const np = points.map(p => ({...p}));
  const srcT = tables.find(t => t.id === srcId);
  if (srcT && dims[srcId] && positions[srcId]) {
    const p = positions[srcId], d = dims[srcId];
    const ref = np.length >= 2 ? np[1] : np[0];
    const sn = closestOnRect(ref.x, ref.y, p.x, p.y, d.w, d.h);
    np[0] = sn;
    if (np.length >= 2) {
      if (Math.abs(sn.x - np[1].x) < Math.abs(sn.y - np[1].y)) np[1].x = sn.x; else np[1].y = sn.y;
    }
  }
  const tgtT = tables.find(t => t.name === refTbl);
  if (tgtT && dims[tgtT.id] && positions[tgtT.id]) {
    const p = positions[tgtT.id], d = dims[tgtT.id];
    const li = np.length - 1;
    const ref = np.length >= 2 ? np[li - 1] : np[li];
    const sn = closestOnRect(ref.x, ref.y, p.x, p.y, d.w, d.h);
    np[li] = sn;
    if (np.length >= 2) {
      if (Math.abs(sn.x - np[li - 1].x) < Math.abs(sn.y - np[li - 1].y)) np[li - 1].x = sn.x; else np[li - 1].y = sn.y;
    }
  }
  return np;
}

function pathLength(points) {
  let len = 0;
  for (let i = 0; i < points.length - 1; i++) len += Math.abs(points[i].x - points[i+1].x) + Math.abs(points[i].y - points[i+1].y);
  return len;
}

function pathCrossesRect(points, rect) {
  for (let i = 0; i < points.length - 1; i++) {
    const p1 = points[i], p2 = points[i+1];
    if (p1.x === p2.x) {
      const minY = Math.min(p1.y, p2.y), maxY = Math.max(p1.y, p2.y);
      if (p1.x >= rect.x && p1.x <= rect.x + rect.w && maxY >= rect.y && minY <= rect.y + rect.h) return true;
    } else {
      const minX = Math.min(p1.x, p2.x), maxX = Math.max(p1.x, p2.x);
      if (p1.y >= rect.y && p1.y <= rect.y + rect.h && maxX >= rect.x && minX <= rect.x + rect.w) return true;
    }
  }
  return false;
}

function findRoute(srcRect, srcColIdx, tgtRect, tgtColIdx, obstacles) {
  const colH = 34, headerH = 40;
  const getColY = (rect, idx) => rect.y + headerH + (idx >= 0 ? idx * colH + colH / 2 : colH / 2);
  const sCy = getColY(srcRect, srcColIdx);
  const tCy = getColY(tgtRect, tgtColIdx);
  const sCx = srcRect.x + srcRect.w / 2;
  const tCx = tgtRect.x + tgtRect.w / 2;
  const padObs = obstacles.map(o => ({ x: o.x - 8, y: o.y - 8, w: o.w + 16, h: o.h + 16 }));
  const candidates = [];
  candidates.push({ points: [{ x: srcRect.x + srcRect.w, y: sCy }, { x: (srcRect.x + srcRect.w + tgtRect.x) / 2, y: sCy }, { x: (srcRect.x + srcRect.w + tgtRect.x) / 2, y: tCy }, { x: tgtRect.x, y: tCy }]});
  candidates.push({ points: [{ x: srcRect.x, y: sCy }, { x: (srcRect.x + tgtRect.x + tgtRect.w) / 2, y: sCy }, { x: (srcRect.x + tgtRect.x + tgtRect.w) / 2, y: tCy }, { x: tgtRect.x + tgtRect.w, y: tCy }]});
  candidates.push({ points: [{ x: sCx, y: srcRect.y + srcRect.h }, { x: sCx, y: (srcRect.y + srcRect.h + tgtRect.y) / 2 }, { x: tCx, y: (srcRect.y + srcRect.h + tgtRect.y) / 2 }, { x: tCx, y: tgtRect.y }]});
  candidates.push({ points: [{ x: sCx, y: srcRect.y }, { x: sCx, y: (srcRect.y + tgtRect.y + tgtRect.h) / 2 }, { x: tCx, y: (srcRect.y + tgtRect.y + tgtRect.h) / 2 }, { x: tCx, y: tgtRect.y + tgtRect.h }]});
  if (obstacles.length > 0) {
    const aboveY = Math.min(srcRect.y, tgtRect.y, ...obstacles.map(o => o.y)) - 50;
    const belowY = Math.max(srcRect.y + srcRect.h, tgtRect.y + tgtRect.h, ...obstacles.map(o => o.y + o.h)) + 50;
    const rightX = Math.max(srcRect.x + srcRect.w, tgtRect.x + tgtRect.w, ...obstacles.map(o => o.x + o.w)) + 50;
    const leftX = Math.min(srcRect.x, tgtRect.x, ...obstacles.map(o => o.x)) - 50;
    candidates.push({ points: [{ x: sCx, y: srcRect.y }, { x: sCx, y: aboveY }, { x: tCx, y: aboveY }, { x: tCx, y: tgtRect.y }]});
    candidates.push({ points: [{ x: sCx, y: srcRect.y + srcRect.h }, { x: sCx, y: belowY }, { x: tCx, y: belowY }, { x: tCx, y: tgtRect.y + tgtRect.h }]});
    candidates.push({ points: [{ x: srcRect.x + srcRect.w, y: sCy }, { x: rightX, y: sCy }, { x: rightX, y: tCy }, { x: tgtRect.x, y: tCy }]});
    candidates.push({ points: [{ x: srcRect.x, y: sCy }, { x: leftX, y: sCy }, { x: leftX, y: tCy }, { x: tgtRect.x + tgtRect.w, y: tCy }]});
  }
  let best = null, bestScore = Infinity;
  for (const c of candidates) {
    let score = 0;
    for (const obs of padObs) { if (pathCrossesRect(c.points, obs)) score += 1000; }
    score += pathLength(c.points);
    if (score < bestScore) { bestScore = score; best = c.points; }
  }
  return best;
}

function pointsToAngularPath(points) {
  if (points.length < 2) return '';
  let d = `M ${points[0].x},${points[0].y}`;
  for (let i = 1; i < points.length; i++) {
    d += ` L ${points[i].x},${points[i].y}`;
  }
  return d;
}

function ColumnBadge({ col, tableId, tableName, activeFk, hoveredFk, fkInfo }) {
  const badge = col.pk ? 'bg-[#d29922]/20 text-[#d29922]' : col.fk ? 'bg-[#a371f7]/20 text-[#a371f7]' : col.uq ? 'bg-[#58a6ff]/20 text-[#58a6ff]' : 'bg-[#30363d]/40 text-[#8b949e]';
  const label = col.pk ? 'PK' : col.fk ? 'FK' : col.uq ? 'UQ' : '';
  const typeColor = { INT:'#6366f1', BIGINT:'#6366f1', SMALLINT:'#6366f1', TINYINT:'#6366f1', VARCHAR:'#22c55e', CHAR:'#22c55e', TEXT:'#22c55e', MEDIUMTEXT:'#22c55e', LONGTEXT:'#22c55e', BOOLEAN:'#f59e0b', DATE:'#06b6d4', DATETIME:'#06b6d4', TIMESTAMP:'#06b6d4', FLOAT:'#ec4899', DOUBLE:'#ec4899', DECIMAL:'#ec4899', BLOB:'#8b5cf6', ENUM:'#f97316', UUID:'#14b8a6', JSON:'#84cc16' };
  const highlightKey = activeFk || hoveredFk;
  const isHighlight = highlightKey && (
    (fkInfo[highlightKey]?.tableId === tableId && fkInfo[highlightKey]?.column === col.name) ||
    (fkInfo[highlightKey]?.refTable === tableName && fkInfo[highlightKey]?.refColumn === col.name)
  );
  const hlColor = '#ffffff';
  return (
    <div className={`flex items-center gap-2 px-3 border-b border-[#21262d] last:border-b-0 ${isHighlight ? 'bg-[#1f6feb]/15 border-l-2 border-l-[#58a6ff] -ml-px' : ''}`} style={{ height: 32 }}>
      <span className="text-[10px] font-mono font-semibold px-1.5 rounded leading-none" style={{ color: isHighlight ? hlColor : (typeColor[col.type] || '#8b949e'), background: (isHighlight ? hlColor : (typeColor[col.type] || '#8b949e')) + '15' }}>{col.type}</span>
      <span className={`text-[13px] font-medium flex-1 truncate ${isHighlight ? 'text-[#e6edf3]' : 'text-[#c9d1d9]'}`}>{col.name}</span>
      <div className="flex gap-1 shrink-0">
        {label && <span className={`text-[10px] font-semibold px-1.5 rounded ${isHighlight ? 'bg-white/20 text-white' : badge}`}>{label}</span>}
        {col.nn && <span className={`text-[10px] font-semibold ${isHighlight ? 'text-white/70' : 'text-[#f85149]/70'}`}>NN</span>}
        {col.ai && <span className={`text-[10px] font-semibold ${isHighlight ? 'text-white/70' : 'text-[#3fb950]/70'}`}>AI</span>}
      </div>
    </div>
  );
}

const TableNode = React.forwardRef(({ table, position, selected, onSelect, onDragStart, onDeleteTable, onAddColumn, activeFk, hoveredFk, fkInfo, categories }, ref) => {
  const c = table.color || '#6366f1';
  const catColor = categories && categories.length > 0 ? categories[0].color : null;
  return (
    <div ref={ref}
      className={`table-card absolute rounded-lg overflow-hidden w-[310px]`}
      style={{
        left: position.x, top: position.y,
        background: 'linear-gradient(180deg, #1c2333 0%, #161b22 100%)',
        border: '1px solid',
        borderColor: selected ? (catColor || c) + '80' : (catColor || '#30363d'),
        borderLeftWidth: catColor ? '4px' : '1px',
        borderLeftColor: catColor || (selected ? c + '80' : '#30363d'),
        boxShadow: selected
          ? `0 0 0 1px ${catColor || c}60, 0 8px 32px rgba(0,0,0,0.5), 0 2px 8px ${catColor || c}30, inset 0 1px 0 rgba(255,255,255,0.06)`
          : '0 4px 16px rgba(0,0,0,0.25), 0 1px 4px rgba(0,0,0,0.3), inset 0 1px 0 rgba(255,255,255,0.05)',
        borderBottom: selected
          ? `2px solid ${catColor || c}60`
          : '2px solid #1a1f2e'
      }}
    >
      <div className="flex items-center justify-between px-3 py-2 cursor-grab active:cursor-grabbing select-none"
        style={{ background: catColor ? `${catColor}18` : `${c}15`, borderBottom: `1px solid ${catColor || c}25` }}
        onMouseDown={(e) => onDragStart(e, table.id)}
      >
        <div className="flex items-center gap-2 min-w-0">
          <div className="w-2.5 h-2.5 rounded-sm shrink-0" style={{ backgroundColor: c }} />
          <h3 className="text-sm font-semibold text-[#e6edf3] truncate">{table.name || <span className="text-[#6e7681] italic">sin nombre</span>}</h3>
          {categories && categories.length > 0 && (
            <div className="flex gap-1 ml-1">
              {categories.map((cat, i) => (
                <span key={i} className="text-[9px] font-bold px-1.5 py-0.5 rounded-full leading-none text-white" style={{ backgroundColor: cat.color, textShadow: '0 1px 2px rgba(0,0,0,0.5)' }} title={cat.name}>
                  {cat.name.charAt(0).toUpperCase()}
                </span>
              ))}
            </div>
          )}
        </div>
        <div className="flex items-center gap-1 shrink-0">
          <span className="text-[11px] text-[#6e7681] font-medium">{table.columns.length} col.</span>
          {selected && (
            <button onClick={e => { e.stopPropagation(); onDeleteTable(table.id); }}
              className="text-[#f85149]  rounded p-1 " title="Eliminar tabla">
              <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M3 6h18"/><path d="M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6"/><path d="M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2"/></svg>
            </button>
          )}
        </div>
      </div>
      <div>
        {table.columns.length === 0 ? (
          <div className="px-3 py-4 text-center"><p className="text-[12px] text-[#6e7681] italic">Sin columnas</p></div>
        ) : (
          table.columns.map(col => <ColumnBadge key={col.id} col={col} tableId={table.id} tableName={table.name} activeFk={activeFk} hoveredFk={hoveredFk} fkInfo={fkInfo} />)
        )}
      </div>
      {selected && (
        <div className="px-2 py-1.5 border-t border-[#30363d]">
          <button onClick={e => { e.stopPropagation(); onAddColumn(table.id); }}
            className="w-full text-[11px] font-medium text-[#c9d1d9]  bg-[#1f6feb]/10  rounded py-1.5  border border-[#58a6ff]/20 ">
            + Columna
          </button>
        </div>
      )}
    </div>
  );
});

function Diagram({ tables, selectedTables, onSelectTable, onAddColumn, onDeleteTable, onUpdateTable, onPositionsChange, positions, zoom, layers, categories, tableCategory, linePaths, onUpdateLinePath, onResetLinePath, onSaveLinePathState, onUndoLinePath, onUpdateLayer, onRemoveLayer, onShowLayerPanel, onShowCategoryPanel, onUpdateRef, multiDragMode, onToggleMultiDrag, onSelectTables, fitKey, showLeft }) {
  const containerRef = useRef(null);
  const canvasRef = useRef(null);
  const dragRef = useRef(null);
  const tableRefs = useRef({});
  const [activeFk, setActiveFk] = useState(null);
  const [hoveredFk, setHoveredFk] = useState(null);
  const [tableDims, setTableDims] = useState({});
  const [pan, setPan] = useState({ x: 0, y: 0 });
  const [isPanning, setIsPanning] = useState(false);
  const panDragRef = useRef(null);
  const selectedTablesRef = useRef(selectedTables);
  selectedTablesRef.current = selectedTables;
  const [activeLayerId, setActiveLayerId] = useState(null);
  const layerDragRef = useRef(null);
  const layerResizeRef = useRef(null);
  const waypointDragRef = useRef(null);
  const tablesRef = useRef(tables);
  tablesRef.current = tables;
  const positionsRef = useRef(positions);
  positionsRef.current = positions;
  const tableDimsRef = useRef(tableDims);
  tableDimsRef.current = tableDims;
  const [selRect, setSelRect] = useState(null);
  const selRectRef = useRef(null);
  const rafRef = useRef(null);
  const pendingMouseEvent = useRef(null);
  const zoomRef = useRef(zoom);
  zoomRef.current = zoom;
  const panRef = useRef(pan);
  panRef.current = pan;

  useEffect(() => { if (activeLayerId && !layers.find(l => l.id === activeLayerId)) setActiveLayerId(null); }, [layers, activeLayerId]);

  const prevTableCount = useRef(0);
  const prevShowLeft = useRef(showLeft);
  const prevFitKey = useRef(0);
  const fitToScreen = useCallback(() => {
    const container = containerRef.current;
    if (!container) return;
    const vals = Object.values(positions).filter(Boolean);
    if (vals.length === 0) return;
    const minX = Math.min(...vals.map(p => p.x)), minY = Math.min(...vals.map(p => p.y));
    const maxX = Math.max(...vals.map(p => p.x + 310)), maxY = Math.max(...vals.map(p => {
      const t = tables.find(t => positions[t.id] === p);
      return p.y + (t ? 40 + t.columns.length * 34 + 44 : 300);
    }));
    const cw = container.clientWidth, ch = container.clientHeight;
    const pad = 40;
    const scale = Math.min((cw - pad) / (maxX - minX + 280), (ch - pad) / (maxY - minY + 200), 1.5);
    const clamped = Math.max(0.25, Math.min(3, scale));
    onUpdateTable(null, null, { abs: clamped });
    setPan({ x: (cw - (maxX - minX) * clamped) / 2 - minX * clamped, y: (ch - (maxY - minY) * clamped) / 2 - minY * clamped });
  }, [tables, positions, onUpdateTable]);

  useEffect(() => {
    const isFirst = prevTableCount.current === 0 && tables.length > 0;
    const fitKeyChanged = prevFitKey.current !== fitKey;
    const leftChanged = prevShowLeft.current !== showLeft;
    prevTableCount.current = tables.length;
    prevFitKey.current = fitKey;
    prevShowLeft.current = showLeft;
    if (isFirst || fitKeyChanged || leftChanged) {
      Promise.resolve().then(fitToScreen);
    }
  }, [tables, fitToScreen, fitKey, showLeft]);

  const fkInfo = useMemo(() => {
    const map = {};
    for (const t of tables) for (const ref of (t.refs || [])) map[`${t.id}-${ref.column}-${ref.refTable}`] = { tableId: t.id, column: ref.column, refTable: ref.refTable, refColumn: ref.refColumn, cardinality: ref.cardinality || 'M:1' };
    return map;
  }, [tables]);

  useEffect(() => {
    const dims = {};
    for (const t of tables) { const el = tableRefs.current[t.id]; if (el) { const r = el.getBoundingClientRect(); dims[t.id] = { w: r.width / zoom, h: r.height / zoom }; } }
    setTableDims(dims);
  }, [tables, zoom]);

  const svgLines = useMemo(() => {
    const lines = []; const rects = {};
    for (const t of tables) { const pos = positions[t.id]; const dim = tableDims[t.id]; if (pos && dim) rects[t.id] = { x: pos.x, y: pos.y, w: dim.w, h: dim.h }; }
    for (const t of tables) {
      for (const ref of (t.refs || [])) {
        const lineKey = `${t.id}-${ref.column}-${ref.refTable}`;
        const srcRect = rects[t.id]; const tgtTable = tables.find(t2 => t2.name === ref.refTable); const tgtRect = tgtTable ? rects[tgtTable.id] : null;
        if (!srcRect || !tgtRect) continue;
        const srcColIdx = t.columns.findIndex(c => c.name === ref.column);
        const tgtColIdx = tgtTable.columns.findIndex(c => c.name === ref.refColumn);
        const obstacles = tables.filter(t2 => t2.id !== t.id && t2.id !== tgtTable.id).map(t2 => rects[t2.id]).filter(Boolean);
        let points;
        if (linePaths && linePaths[lineKey]) {
          points = linePaths[lineKey];
        } else {
          points = findRoute(srcRect, srcColIdx, tgtRect, tgtColIdx, obstacles);
        }
        if (points) {
          const card = ref.cardinality || 'M:1';
          const startPos = points.length >= 2 ? midpoint(points[0], points[1]) : points[0];
          const endPos = points.length >= 2 ? midpoint(points[points.length - 2], points[points.length - 1]) : points[points.length - 1];
          let startLabel, endLabel, startMarker, endMarker;
          switch (card) {
            case '1:1': startLabel = '1'; endLabel = '1'; startMarker = 'one'; endMarker = 'one'; break;
            case '1:M': startLabel = '1'; endLabel = 'N'; startMarker = 'one'; endMarker = 'many'; break;
            case 'M:1': startLabel = 'N'; endLabel = '1'; startMarker = 'many'; endMarker = 'one'; break;
            case 'M:M': startLabel = 'N'; endLabel = 'N'; startMarker = 'many'; endMarker = 'many'; break;
            default: startLabel = 'N'; endLabel = '1'; startMarker = 'many'; endMarker = 'one';
          }
          lines.push({ key: lineKey, points, startPos, endPos, startLabel, endLabel, startMarker, endMarker, cardinality: card });
        }

    }

  }, [tables, positions, tableDims, linePaths]);

  const layerShapes = useMemo(() =>
    layers.map(layer => {
      const rect = layerRectPath(layer);

    }),
  [layers]);

  const tableCategories = useMemo(() => {
    const m = {};

    }
    return m;
  }, [categories, tableCategory]);

  const handleWheel = useCallback((e) => { e.preventDefault(); onUpdateTable(null, null, e.deltaY > 0 ? -0.1 : 0.1); }, [onUpdateTable]);

  const handleMouseDown = useCallback((e, tableId) => {
    if (e.button !== 0) return; e.stopPropagation();
    const pos = positions[tableId]; if (!pos) return;
    const curSel = selectedTablesRef.current; const tableSelected = curSel[tableId]; const multiCount = Object.keys(curSel).length;
    let dragInfo;
    if (multiDragMode) {
      const origins = {}; for (const t of tables) { const p = positions[t.id]; if (p) origins[t.id] = { x: p.x, y: p.y }; }
      dragInfo = { tableId, startX: e.clientX, startY: e.clientY, origins, moved: false };
    } else if (tableSelected && multiCount > 1) {
      const origins = {}; for (const id of Object.keys(curSel)) { const p = positions[id]; if (p) origins[id] = { x: p.x, y: p.y }; }
      dragInfo = { tableId, startX: e.clientX, startY: e.clientY, origins, moved: false };
    } else dragInfo = { tableId, startX: e.clientX, startY: e.clientY, origX: pos.x, origY: pos.y, moved: false };
    if (linePaths) {
      const dragIds = dragInfo.origins ? Object.keys(dragInfo.origins) : [tableId];
      const dragNames = new Set(tables.filter(t => dragIds.includes(t.id)).map(t => t.name));
      const affected = {};
      for (const [key, pts] of Object.entries(linePaths)) {
        const d1 = key.indexOf('-'); if (d1 === -1) continue;
        const srcId = key.substring(0, d1);
        const d2 = key.indexOf('-', d1 + 1); if (d2 === -1) continue;
        const refTable = key.substring(d2 + 1);
        const indices = [];
        if (dragIds.includes(srcId)) indices.push(0);
        if (dragNames.has(refTable)) indices.push(pts.length - 1);
        if (indices.length > 0) affected[key] = { pts: pts.map(p => ({...p})), indices };

  const handleWaypointMove = useCallback((e) => {
    const dr = waypointDragRef.current;
    if (!dr) return;
    const dx = (e.clientX - dr.startX) / zoomRef.current;
    const dy = (e.clientY - dr.startY) / zoomRef.current;
    const pi = dr.pointIndex;
    const orig = dr.origPoints;
    if (pi <= 0 || pi >= orig.length - 1) {
      let newPoints = orig.map((p, i) =>
        i === pi ? { x: p.x + dx, y: p.y + dy } : { ...p }
      );
      newPoints = snapEndpoints(newPoints, dr.lineKey, tablesRef.current, positionsRef.current, tableDimsRef.current);
      onUpdateLinePath(dr.lineKey, newPoints);
      return;
    }
    const eps = 0.5;
    const prevH = Math.abs(orig[pi - 1].y - orig[pi].y) < eps;
    const nextH = Math.abs(orig[pi].y - orig[pi + 1].y) < eps;
    const newPoints = orig.map(p => ({ ...p }));
    newPoints[pi].x = orig[pi].x + dx;
    newPoints[pi].y = orig[pi].y + dy;
    if (prevH && !nextH) {
      newPoints[pi - 1].x = orig[pi - 1].x;
      newPoints[pi - 1].y = newPoints[pi].y;
      newPoints[pi + 1].x = newPoints[pi].x;
      newPoints[pi + 1].y = orig[pi + 1].y;
    } else if (!prevH && nextH) {
      newPoints[pi - 1].x = newPoints[pi].x;
      newPoints[pi - 1].y = orig[pi - 1].y;
      newPoints[pi + 1].x = orig[pi + 1].x;
      newPoints[pi + 1].y = newPoints[pi].y;
    } else {
      newPoints[pi] = { x: orig[pi].x + dx, y: orig[pi].y + dy };
    }
    const snappedPoints = snapEndpoints(newPoints, dr.lineKey, tablesRef.current, positionsRef.current, tableDimsRef.current);
    onUpdateLinePath(dr.lineKey, snappedPoints);
  }, [onUpdateLinePath]);

  const handleLineMouseDown = useCallback((e, lineKey, points) => {
    e.stopPropagation();
    if (e.button !== 0) return;
    if (onSaveLinePathState) onSaveLinePathState(lineKey);
    const rect = containerRef.current?.getBoundingClientRect();
    if (!rect) return;
    const mx = (e.clientX - rect.left - pan.x) / zoom;
    const my = (e.clientY - rect.top - pan.y) / zoom;
    let bestSeg = 0, bestDist = Infinity;
    for (let i = 0; i < points.length - 1; i++) {
      const ax = points[i].x, ay = points[i].y;
      const bx = points[i + 1].x, by = points[i + 1].y;
      const dx = bx - ax, dy = by - ay;
      const len = Math.sqrt(dx * dx + dy * dy);
      if (len < 0.001) continue;
      const t = Math.max(0, Math.min(1, ((mx - ax) * dx + (my - ay) * dy) / (len * len)));
      const cx = ax + t * dx, cy = ay + t * dy;
      const dist = Math.hypot(mx - cx, my - cy);
      if (dist < bestDist) { bestDist = dist; bestSeg = i; }
    }
    const newPoints = [...points];
    const newIndex = bestSeg + 1;
    newPoints.splice(newIndex, 0, { x: mx, y: my });
    onUpdateLinePath(lineKey, newPoints);
    setActiveFk(lineKey);
    waypointDragRef.current = {
      lineKey, pointIndex: newIndex,
      startX: e.clientX, startY: e.clientY,
      origPoints: newPoints.map(p => ({ ...p }))
    };
    document.addEventListener('mousemove', handleMouseMove);
    document.addEventListener('mouseup', handleMouseUp);
  }, [pan, zoom, onUpdateLinePath, onSaveLinePathState, handleMouseMove, handleMouseUp]);

  const handleWaypointDoubleClick = useCallback((e, lineKey, pointIndex, points) => {
    e.preventDefault(); e.stopPropagation();
    if (points.length <= 2) return;
    if (onSaveLinePathState) onSaveLinePathState(lineKey);
    const newPoints = points.filter((_, i) => i !== pointIndex);
    if (newPoints.length < 2) { onResetLinePath(lineKey); return; }
    onUpdateLinePath(lineKey, newPoints);
  }, [onUpdateLinePath, onResetLinePath]);

  const processMouseEvent = useCallback((e) => {
    if (dragRef.current) {
      const dr = dragRef.current; const dx = (e.clientX - dr.startX) / zoomRef.current; const dy = (e.clientY - dr.startY) / zoomRef.current;
      if (Math.abs(e.clientX - dr.startX) > 3 || Math.abs(e.clientY - dr.startY) > 3) dr.moved = true;
      if (dr.origins) { for (const id of Object.keys(dr.origins)) onPositionsChange(id, dr.origins[id].x + dx, dr.origins[id].y + dy); }
      else onPositionsChange(dr.tableId, dr.origX + dx, dr.origY + dy);
      if (dr.affectedLinePaths) {
        for (const [key, { pts: origPts, indices }] of Object.entries(dr.affectedLinePaths)) {
          const newPoints = origPts.map((p, i) => indices.includes(i) ? { x: p.x + dx, y: p.y + dy } : { ...p });
          for (const idx of indices) {
            const eps = 0.5;
            if (idx === 0 && newPoints.length >= 2) {
              if (Math.abs(origPts[0].y - origPts[1].y) < eps) { newPoints[1].y = newPoints[0].y; }
              else { newPoints[1].x = newPoints[0].x; }
            }
            if (idx === newPoints.length - 1 && newPoints.length >= 2) {
              const last = newPoints.length - 1;
              if (Math.abs(origPts[last - 1].y - origPts[last].y) < eps) { newPoints[last - 1].y = newPoints[last].y; }
              else { newPoints[last - 1].x = newPoints[last].x; }
            }
          }
          const snappedPts = snapEndpoints(newPoints, key, tablesRef.current, positionsRef.current, tableDimsRef.current);

        }
      }
      return;
    }
    if (panDragRef.current) { setPan({ x: panDragRef.current.origPanX + (e.clientX - panDragRef.current.startX), y: panDragRef.current.origPanY + (e.clientY - panDragRef.current.startY) }); }
    handleWaypointMove(e);
  }, [onPositionsChange, handleWaypointMove, onUpdateLinePath]);

  const handleMouseMove = useCallback((e) => {
    if (selRectRef.current) {
      const rect = containerRef.current?.getBoundingClientRect();
      if (!rect) return;
      const mx = (e.clientX - rect.left - panRef.current.x) / zoomRef.current;
      const my = (e.clientY - rect.top - panRef.current.y) / zoomRef.current;

    }

      const upd = {}; const minW = 100, minH = 60;
      if (dr.sx === 1) upd.w = Math.max(minW, dr.origW + dx); else { upd.x = dr.origX + dx; upd.w = Math.max(minW, dr.origW - dx); }

      const minY = Math.min(r.startY, r.endY);

          if (!pos) continue;

    }

  const handleWaypointHandleMouseDown = useCallback((e, lineKey, pointIndex) => {
    e.stopPropagation();

      startX: e.clientX, startY: e.clientY,

    };

  const handleLayerMouseDown = useCallback((e, layerId) => {

  }, [layers, handleMouseMove, handleMouseUp, onShowLayerPanel]);

  const handleLayerResizeDown = useCallback((e, layerId, sx, sy) => {
    if (e.button !== 0) return; e.stopPropagation(); const layer = layers.find(l => l.id === layerId); if (!layer) return;
    setActiveLayerId(layerId); if (onShowLayerPanel) onShowLayerPanel(true);
    layerResizeRef.current = { layerId, startX: e.clientX, startY: e.clientY, sx, sy, origX: layer.x, origY: layer.y, origW: layer.w, origH: layer.h };

  const handleCanvasMouseDown = useCallback((e) => {

      const rect = containerRef.current?.getBoundingClientRect();
      if (!rect) return;
      const mx = (e.clientX - rect.left - pan.x) / zoom;
      const my = (e.clientY - rect.top - pan.y) / zoom;
      selRectRef.current = { startX: mx, startY: my, endX: mx, endY: my };
      setSelRect({ startX: mx, startY: my, endX: mx, endY: my });

    }
    panDragRef.current = { startX: e.clientX, startY: e.clientY, origPanX: pan.x, origPanY: pan.y };
    setIsPanning(true); document.addEventListener('mousemove', handleMouseMove); document.addEventListener('mouseup', handleMouseUp);
  }, [pan.x, pan.y, multiDragMode, zoom, handleMouseMove, handleMouseUp, onSelectTables]);

  const canvasBounds = useMemo(() => {
    const container = containerRef.current;
    const cw = container?.clientWidth || 1200;
    const ch = container?.clientHeight || 800;
    const PAD = 1200;
    let minX = Infinity, minY = Infinity, maxX = -Infinity, maxY = -Infinity;
    for (const t of tables) {
      const p = positions[t.id];
      if (!p) continue;
      const nCols = t.columns.length;
      const h = 40 + nCols * 34 + 44;
      minX = Math.min(minX, p.x);
      minY = Math.min(minY, p.y);
      maxX = Math.max(maxX, p.x + 310);
      maxY = Math.max(maxY, p.y + h);
    }
    for (const layer of layers) {
      if (layer.visible === false) continue;
      minX = Math.min(minX, layer.x);
      minY = Math.min(minY, layer.y);
      maxX = Math.max(maxX, layer.x + layer.w);
      maxY = Math.max(maxY, layer.y + layer.h);
    }
    const w = isFinite(maxX) ? maxX - minX + PAD * 2 : cw;
    const h = isFinite(maxY) ? maxY - minY + PAD * 2 : ch;

  }, [tables, positions, layers]);

  return (
    <div ref={containerRef}
      className={`diagram-container diagram-pattern relative w-full h-full overflow-hidden ${isPanning ? 'panning' : ''}`}
      onWheel={handleWheel} onMouseDown={handleCanvasMouseDown}>
      <div ref={canvasRef} className="diagram-canvas absolute" style={{ transform: `translate(${pan.x}px, ${pan.y}px) scale(${zoom})`, transformOrigin: '0 0', width: canvasBounds.width, height: canvasBounds.height }}>
         <svg className="absolute inset-0 w-full h-full diagram-svg" style={{ pointerEvents: 'none', overflow: 'visible' }}>
          <defs>
            <marker id="one-marker" viewBox="0 0 12 12" refX="6" refY="6" markerWidth="10" markerHeight="10" orient="auto"><line x1="6" y1="1" x2="6" y2="11" stroke="#ffffff" strokeWidth="2" opacity="0.5" /></marker>
            <marker id="one-marker-hl" viewBox="0 0 12 12" refX="6" refY="6" markerWidth="10" markerHeight="10" orient="auto"><line x1="6" y1="1" x2="6" y2="11" stroke="#ffffff" strokeWidth="2.5" /></marker>
            <marker id="many-marker" viewBox="0 0 16 14" refX="0" refY="7" markerWidth="14" markerHeight="12" orient="auto"><line x1="0" y1="2" x2="5" y2="7" stroke="#ffffff" strokeWidth="1.5" opacity="0.5" /><line x1="0" y1="12" x2="5" y2="7" stroke="#ffffff" strokeWidth="1.5" opacity="0.5" /><line x1="0" y1="7" x2="5" y2="7" stroke="#ffffff" strokeWidth="2" opacity="0.5" /></marker>
            <marker id="many-marker-hl" viewBox="0 0 16 14" refX="0" refY="7" markerWidth="14" markerHeight="12" orient="auto"><line x1="0" y1="2" x2="5" y2="7" stroke="#ffffff" strokeWidth="2" /><line x1="0" y1="12" x2="5" y2="7" stroke="#ffffff" strokeWidth="2" /><line x1="0" y1="7" x2="5" y2="7" stroke="#ffffff" strokeWidth="2.5" /></marker>
            <filter id="glow"><feGaussianBlur stdDeviation="2.5" result="blur" /><feMerge><feMergeNode in="blur" /><feMergeNode in="SourceGraphic" /></feMerge></filter>
            <filter id="layer-glow"><feGaussianBlur stdDeviation="20" result="blur" /><feMerge><feMergeNode in="blur" /><feMergeNode in="SourceGraphic" /></feMerge></filter>
            <filter id="layer-glow-inner"><feGaussianBlur stdDeviation="4" result="blur" /><feMerge><feMergeNode in="blur" /><feMergeNode in="SourceGraphic" /></feMerge></filter>
          </defs>

          {(() => { const c = '#8b949e', o = 0.4, s = 24, g = 4, w = canvasBounds.width, h = canvasBounds.height; return (<g opacity={o} stroke={c} strokeWidth="2" fill="none" style={{ pointerEvents: 'none' }}><path d={`M${g},${g + s} L${g},${g} L${g + s},${g}`} /><path d={`M${w - g - s},${g} L${w - g},${g} L${w - g},${g + s}`} /><path d={`M${g},${h - g - s} L${g},${h - g} L${g + s},${h - g}`} /><path d={`M${w - g - s},${h - g} L${w - g},${h - g} L${w - g},${h - g - s}`} /></g>); })()}

            const h = Math.abs(selRect.endY - selRect.startY);

          })()}
          {layerShapes.filter(ls => ls.visible !== false).map(ls => (
            <g key={ls.id}>
              <path d={ls.path} fill={ls.color} fillOpacity="0.04" filter="url(#layer-glow)" style={{ pointerEvents: 'none' }} />
              <path d={ls.path} fill={ls.color} fillOpacity="0.08" style={{ pointerEvents: 'none' }} />
              <path d={ls.path} fill="none" stroke={ls.color} strokeWidth="0.5" strokeOpacity="0.12" transform="translate(0, 1)" style={{ pointerEvents: 'none' }} />

                <rect x={ls.x} y={ls.y} width={ls.w} height={ls.h} fill="none" stroke={ls.color} strokeWidth="1" strokeOpacity="0.15" rx="12" ry="12" style={{ pointerEvents: 'none' }} />
              </>}

  </script>
  <script type="text/babel">
const { useState, useCallback, useMemo, useRef, useEffect } = React;

function App() {
  const [sql, setSql] = useState('');
  const [tables, setTables] = useState([]);
  const [selectedTables, setSelectedTables] = useState({});
  const [error, setError] = useState(null);
  const [zoom, setZoom] = useState(1);
  const [multiDragMode, setMultiDragMode] = useState(false);
  const [positions, setPositions] = useState({});
  const [showLeft, setShowLeft] = useState(true);
  const [layers, setLayers] = useState([]);
  const [linePaths, setLinePaths] = useState({});
  const [linePathHistory, setLinePathHistory] = useState({});
  const [showLayers, setShowLayers] = useState(false);
  const [categories, setCategories] = useState([]);
  const [tableCategory, setTableCategory] = useState({});
  const [showCategories, setShowCategories] = useState(false);
  const [showSortPanel, setShowSortPanel] = useState(false);
  const [sortFitKey, setSortFitKey] = useState(0);
  const parseTimeoutRef = useRef(null);
  const fileInputRef = useRef(null);

  const issues = useMemo(() => detectIssues(tables, positions), [tables, positions]);

  const handleLoadDemo = useCallback(() => {
    const demo = `CREATE TABLE clientes (
  id INT PRIMARY KEY AUTO_INCREMENT,
  nombre VARCHAR(100) NOT NULL,
  email VARCHAR(255) UNIQUE,
  telefono VARCHAR(20),
  fecha_registro DATE,
  activo BOOLEAN DEFAULT TRUE
);

CREATE TABLE categorias (
  id INT PRIMARY KEY AUTO_INCREMENT,
  nombre VARCHAR(100) NOT NULL,
  descripcion TEXT
);

CREATE TABLE productos (
  id INT PRIMARY KEY AUTO_INCREMENT,
  nombre VARCHAR(200) NOT NULL,
  precio DECIMAL(10,2) NOT NULL,
  stock INT DEFAULT 0,
  categoria_id INT,
  FOREIGN KEY (categoria_id) REFERENCES categorias(id)
);

CREATE TABLE pedidos (
  id INT PRIMARY KEY AUTO_INCREMENT,
  cliente_id INT NOT NULL,
  fecha DATETIME,
  total DECIMAL(10,2),
  estado VARCHAR(20) DEFAULT 'pendiente',
  FOREIGN KEY (cliente_id) REFERENCES clientes(id)
);

CREATE TABLE pedido_productos (
  id INT PRIMARY KEY AUTO_INCREMENT,
  pedido_id INT NOT NULL,
  producto_id INT NOT NULL,
  cantidad INT NOT NULL,
  precio_unitario DECIMAL(10,2),
  FOREIGN KEY (pedido_id) REFERENCES pedidos(id),
  FOREIGN KEY (producto_id) REFERENCES productos(id)
);`;
    syncSqlToTables(demo);
    setShowLeft(true);
  }, [syncSqlToTables]);

  const handleArrange = useCallback(() => {
    if (tables.length === 0) return;
    const newPos = arrangeTables(tables, positions);
    setPositions(newPos);
    setLinePaths({});
  }, [tables, positions]);

  const handleSort = useCallback((sortId) => {
    if (tables.length === 0) return;
    let newPos;
    switch (sortId) {
      case 'name': newPos = sortByName(tables); break;
      case 'nameDesc': newPos = sortByNameDesc(tables); break;
      case 'columnsAsc': newPos = sortByColumns(tables, true); break;
      case 'columnsDesc': newPos = sortByColumns(tables, false); break;
      case 'relationships': newPos = arrangeTables(tables, positions); break;
      case 'category': newPos = sortByCategory(tables, tableCategory, categories); break;
      case 'color': newPos = sortByColor(tables); break;
      case 'grid3': newPos = sortGrid(tables, 3); break;
      case 'grid4': newPos = sortGrid(tables, 4); break;
      case 'grid5': newPos = sortGrid(tables, 5); break;
      default: return;
    }
    setPositions(newPos);
    setLinePaths({});
    setSortFitKey(k => k + 1);
  }, [tables, positions, tableCategory, categories]);

  const syncSqlToTables = useCallback((value) => {
    value = stripSQLComments(value); setSql(value); setError(null);
    if (parseTimeoutRef.current) clearTimeout(parseTimeoutRef.current);
    parseTimeoutRef.current = setTimeout(() => {
      try {
        if (!value.trim()) { setTables([]); setSelectedTables({}); setPositions({}); setLayers([]); setTableCategory({}); return; }
        const parsed = parseSQL(value);
        if (parsed.length === 0 && value.trim()) { setError('No se detectaron tablas.'); return; }
        setPositions(autoLayout(parsed)); setTables(parsed); setSelectedTables({}); setError(null);
      } catch (e) { setError('Error: ' + e.message); }
    }, 400);
  }, []);

  useEffect(() => { return () => { if (parseTimeoutRef.current) clearTimeout(parseTimeoutRef.current); }; }, []);

  useEffect(() => {
    const handler = (e) => { if ((e.ctrlKey || e.metaKey) && e.key === 'b') { e.preventDefault(); setShowLeft(s => !s); } };
    window.addEventListener('keydown', handler); return () => window.removeEventListener('keydown', handler);
  }, []);

  const handleImportFile = useCallback((e) => {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = function (ev) {
      syncSqlToTables(ev.target.result);
    };
    reader.readAsText(file);
    e.target.value = '';
  }, [syncSqlToTables]);

  const commitTables = useCallback((nextTables) => {
    setTables(nextTables);
    const newSql = generateMySQL(nextTables, categories, tableCategory);
    setSql(newSql);
    setError(null);
  }, [categories, tableCategory]);

  const updateTable = useCallback((updated) => { commitTables(tables.map(t => t.id === updated.id ? updated : t)); }, [tables, commitTables]);
  const deleteTable = useCallback((id) => {
    const next = tables.filter(t => t.id !== id);
    setSelectedTables(prev => { const p = { ...prev }; delete p[id]; return p; });
    setPositions(prev => { const p = { ...prev }; delete p[id]; return p; });
    setTableCategory(prev => { const p = { ...prev }; delete p[id]; return p; });
    commitTables(next);
  }, [tables, commitTables]);
  const addColumnToTable = useCallback((tid) => {
    const nc = { id: uid(), name: '', type: 'VARCHAR', length: 255, values: '', pk: false, nn: false, uq: false, ai: false, fk: false, refTable: '', refColumn: '', defaultValue: '' };
    commitTables(tables.map(t => t.id === tid ? { ...t, columns: [...t.columns, nc] } : t));
  }, [tables, commitTables]);

  const updateRef = useCallback((tableId, column, refTable, cardinality) => {
    const next = tables.map(t => {
      if (t.id !== tableId) return t;
      return { ...t, refs: (t.refs || []).map(r => r.column === column && r.refTable === refTable ? { ...r, cardinality } : r) };
    });
    commitTables(next);
  }, [tables, commitTables]);

  const handleZoomOrPos = useCallback((tid, key, val) => {
    if (key === null && val === null) return;
    if (tid === null && key === null) {
      if (typeof val === 'number') { setZoom(z => Math.max(0.25, Math.min(3, z + val))); return; }
      if (val && typeof val === 'object' && val.abs !== undefined) { setZoom(Math.max(0.25, Math.min(3, val.abs))); return; }
      return;
    }
    if (val === 'fit') {
      const vals = Object.values(positions);
      if (vals.length === 0) return;
      const minX = Math.min(...vals.map(p => p.x)), minY = Math.min(...vals.map(p => p.y));
      const maxX = Math.max(...vals.map(p => p.x + 310)), maxY = Math.max(...vals.map(p => p.y + 300));
      const container = document.querySelector('.diagram-container');
      if (!container) return;
      const cw = container.clientWidth - 40, ch = container.clientHeight - 40;
      const scale = Math.min(cw / (maxX - minX + 280), ch / (maxY - minY + 200), 1.5);
      setZoom(Math.max(0.25, Math.min(3, scale))); return;
    }
    setPositions(prev => { const p = prev[tid]; if (!p) return prev; return { ...prev, [tid]: { x: p.x + (key === 'x' ? val - p.x : 0), y: p.y + (key === 'y' ? val - p.y : 0) } }; });
  }, [positions]);

  const handlePositionChange = useCallback((tid, x, y) => { setPositions(prev => ({ ...prev, [tid]: { x, y } })); }, []);

  const handleLinePathChange = useCallback((key, points) => {
    setLinePaths(prev => ({ ...prev, [key]: points }));
  }, []);

  const handleResetLinePath = useCallback((key) => {
    setLinePaths(prev => { const next = { ...prev }; delete next[key]; return next; });
  }, []);

  const handleSaveLinePathState = useCallback((key) => {
    setLinePathHistory(prev => {
      const current = linePaths[key];
      if (!current) return prev;
      const history = prev[key] || [];
      return { ...prev, [key]: [...history.slice(-20), current.map(p => ({ ...p }))] };
    });
  }, [linePaths]);

  const handleUndoLinePath = useCallback((key) => {
    setLinePathHistory(prev => {
      const history = prev[key];
      if (!history || history.length === 0) return prev;
      const restored = history[history.length - 1];
      const newHistory = history.slice(0, -1);
      setLinePaths(p => ({ ...p, [key]: restored }));
      return { ...prev, [key]: newHistory.length > 0 ? newHistory : undefined };
    });
  }, []);

  const selectedTableData = useMemo(() => { const ids = Object.keys(selectedTables); return ids.length === 1 ? tables.find(t => t.id === ids[0]) || null : null; }, [tables, selectedTables]);

  const handleSelectTable = useCallback((id, ctrlKey) => {
    setSelectedTables(prev => {
      if (ctrlKey) { const next = { ...prev }; if (next[id]) { delete next[id]; return next; } next[id] = true; return next; }
      return { [id]: true };
    });
  }, []);

  const handleSelectTables = useCallback((ids) => {
    setSelectedTables(prev => {
      const next = {};
      for (const id of ids) next[id] = true;
      return next;
    });
  }, []);

  const addLayer = useCallback(() => {
    const colors = ['#6366f1','#ec4899','#22c55e','#f59e0b','#06b6d4','#8b5cf6','#f97316','#84cc16'];
    setLayers(prev => { const idx = prev.length; const offset = idx * 30; return [...prev, { id: uid(), name: `Capa ${idx + 1}`, color: colors[idx % colors.length], visible: true, x: 120 + offset, y: 80 + offset, w: 350, h: 250 }]; });
  }, []);

  const removeLayer = useCallback((id) => setLayers(prev => prev.filter(l => l.id !== id)), []);
  const updateLayer = useCallback((id, updates) => setLayers(prev => prev.map(l => l.id === id ? { ...l, ...updates } : l)), []);

  const addCategory = useCallback(() => {
    const catColors = ['#d29922','#58a6ff','#3fb950','#f85149','#bc8cff','#f0883e','#79c0ff','#56d364'];
    setCategories(prev => [...prev, { id: uid(), name: `Categoría ${prev.length + 1}`, color: catColors[prev.length % catColors.length] }]);
  }, []);

  const removeCategory = useCallback((id) => {
    setCategories(prev => prev.filter(c => c.id !== id));
    setTableCategory(prev => { const p = { ...prev }; for (const k of Object.keys(p)) { if (p[k] === id) delete p[k]; } return p; });
  }, []);
  const updateCategory = useCallback((id, updates) => setCategories(prev => prev.map(c => c.id === id ? { ...c, ...updates } : c)), []);
  const setTableCategoryId = useCallback((tableId, categoryId) => {
    setTableCategory(prev => {
      if (!categoryId) { const p = { ...prev }; delete p[tableId]; return p; }
      return { ...prev, [tableId]: categoryId };
    });
  }, []);

  return (
    <div className="h-screen flex flex-col bg-[#0d1117]">
      <header className="bg-[#161b22]/80 border-b border-[#21262d]/50 px-5 py-3 flex items-center justify-between shrink-0">
        <div className="flex items-center gap-3">
          <div className="bg-[#1f6feb]/20 rounded-lg p-2">
            <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5" className="text-[#58a6ff]">
              <ellipse cx="12" cy="5" rx="9" ry="3"/><path d="M21 12c0 1.66-4 3-9 3s-9-1.34-9-3"/><path d="M3 5v14c0 1.66 4 3 9 3s9-1.34 9-3V5"/>
            </svg>
          </div>
          <h1 className="text-lg font-bold text-[#c9d1d9]">Database Modeler</h1>
        </div>
        <div className="flex items-center gap-1.5">
          <input ref={fileInputRef} type="file" accept=".sql" onChange={handleImportFile} className="hidden" />
          <button onClick={() => fileInputRef.current?.click()}
            className="text-[12px] font-medium text-[#8b949e] hover:text-[#c9d1d9] bg-[#21262d]/80 hover:bg-[#30363d]/80 rounded-lg px-3 h-8 flex items-center border border-[#30363d]/50 transition-colors" title="Importar archivo SQL">
            <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" className="mr-1.5 shrink-0"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
            Importar
          </button>

          {tables.length > 0 && <>
            <div className="w-px h-5 bg-[#30363d]/40 mx-0.5" />
            <div className="flex bg-[#21262d]/80 rounded-lg border border-[#30363d]/50 overflow-hidden">
              <button data-export="png" onClick={() => exportPNG(`diagrama-${Date.now()}.png`)}
                className="text-[12px] font-medium px-2.5 h-8 text-[#8b949e] hover:text-[#c9d1d9] hover:bg-[#30363d]/50 border-r border-[#30363d]/50 flex items-center gap-1.5 transition-colors" title="Exportar PNG">
                <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>
                PNG
              </button>
              <button data-export="pdf" onClick={() => exportPDF(`diagrama-${Date.now()}.pdf`)}
                className="text-[12px] font-medium px-2.5 h-8 text-[#8b949e] hover:text-[#c9d1d9] hover:bg-[#30363d]/50 flex items-center gap-1.5 transition-colors" title="Exportar PDF">
                <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><polyline points="10 9 9 9 8 9"/></svg>
                PDF
              </button>
            </div>
            <button onClick={() => setShowSortPanel(s => !s)}
              className={`text-[12px] font-medium rounded-lg px-3 h-8 flex items-center border gap-1.5 transition-colors ${showSortPanel ? 'text-[#3fb950] bg-[#3fb950]/15 border-[#3fb950]/30' : 'text-[#8b949e] hover:text-[#c9d1d9] bg-[#21262d]/80 hover:bg-[#30363d]/80 border-[#30363d]/50'}`}
              title="Panel de ordenamiento">
              <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2">
                <polyline points="16 3 21 3 21 8"/><line x1="4" y1="20" x2="21" y2="3"/>
                <polyline points="21 16 21 21 16 21"/><line x1="15" y1="15" x2="21" y2="21"/>
                <line x1="4" y1="4" x2="9" y2="9"/>
              </svg>
              Ordenar
              {issues.total > 0 && (
                <span className="text-[10px] font-bold px-1.5 py-0.5 rounded-full bg-[#d29922]/20 text-[#d29922] ml-1">{issues.total}</span>
              )}
            </button>
            <div className="w-px h-5 bg-[#30363d]/40 mx-0.5" />
            <button onClick={() => setShowLayers(s => !s)}
              className={`text-[12px] font-medium rounded-lg px-3 h-8 flex items-center border transition-colors ${showLayers || layers.length > 0 ? 'text-[#a371f7] bg-[#a371f7]/15 border-[#a371f7]/30' : 'text-[#8b949e] hover:text-[#c9d1d9] bg-[#21262d]/80 hover:bg-[#30363d]/80 border-[#30363d]/50'}`}>
              <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5" className="mr-1.5 shrink-0">
                <rect x="3" y="3" width="18" height="18" rx="2" ry="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/>
              </svg>
              <span>Capas</span>
              {layers.length > 0 && (
                <span className="ml-1.5 flex items-center gap-1">
                  <span className="flex -space-x-1">
                    {layers.slice(0, 4).map(l => (
                      <span key={l.id} className="w-2 h-2 rounded-full border border-[#0d1117]" style={{ backgroundColor: l.color }} />
                    ))}
                  </span>
                  <span className="text-[10px] opacity-60">{layers.length}</span>
                </span>
              )}
            </button>
            <button onClick={() => setShowCategories(s => !s)}
              className={`text-[12px] font-medium rounded-lg px-3 h-8 flex items-center border transition-colors ${showCategories || categories.length > 0 ? 'text-[#d29922] bg-[#d29922]/15 border-[#d29922]/30' : 'text-[#8b949e] hover:text-[#c9d1d9] bg-[#21262d]/80 hover:bg-[#30363d]/80 border-[#30363d]/50'}`}>
              <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5" className="mr-1.5 shrink-0">
                <path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/>
              </svg>
              <span>Categorías</span>
              {categories.length > 0 && <span className="ml-1.5 text-[10px] opacity-60">({categories.length})</span>}
            </button>
          </>}
          {error && <span className="text-[12px] text-[#f85149] bg-[#f85149]/10 rounded-full px-3 py-1">{error}</span>}
        </div>
      </header>

      <div className="flex-1 flex overflow-hidden relative">
        <div className={`${showLeft ? 'w-[460px]' : 'w-0'} overflow-hidden shrink-0 border-r border-[#21262d]/50 bg-[#161b22]/30`}>
          <div className="w-[460px] p-2.5 h-full flex flex-col">
            <div className="flex items-center gap-1 mb-2 shrink-0 border-b border-[#30363d]/40 pb-2.5">
              <div className="flex items-center gap-1.5">
                <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" className="text-[#58a6ff]"><polyline points="16 18 22 12 16 6"/><polyline points="8 6 2 12 8 18"/></svg>
                <span className="text-[11px] font-medium text-[#8b949e]">Editor SQL</span>
              </div>
              <div className="flex-1" />
              {tables.length > 0 && (
                <span className="text-[10px] text-[#6e7681] bg-[#21262d]/60 border border-[#30363d]/40 rounded-full px-2.5 py-0.5 font-medium">
                  {tables.length} {tables.length === 1 ? 'tabla' : 'tablas'}
                </span>
              )}
            </div>
            <div className="flex-1 min-h-0">
              <SqlEditor sql={sql} onChange={syncSqlToTables} />
            </div>
            {selectedTableData && (
              <div className="shrink-0 mt-2 border-t border-[#30363d]/40 pt-2">
                <TableEditor table={selectedTableData} onUpdateTable={updateTable} onClose={() => setSelectedTables({})} />
              </div>
            )}
          </div>
        </div>

        <button onClick={() => setShowLeft(!showLeft)}
          className="absolute top-3 z-20 bg-[#21262d]/90 border border-[#30363d]/60 rounded-r-lg p-2    shadow-lg "
          style={{ left: showLeft ? '460px' : '0' }}
          title={showLeft ? 'Ocultar panel (Ctrl+B)' : 'Mostrar panel (Ctrl+B)'}>
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" className="text-[#8b949e]  ">
            <path d={showLeft ? "M15 18l-6-6 6-6" : "M9 18l6-6-6-6"} />
          </svg>
        </button>

        <button onClick={handleLoadDemo}
          className="absolute z-20 bg-[#238636]/20 border border-[#3fb950]/30 rounded-r-lg p-2 shadow-lg hover:bg-[#238636]/30"
          style={{ left: showLeft ? '460px' : '0', top: '52px' }}
          title="Cargar SQL de ejemplo">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" className="text-[#3fb950]">
            <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
            <polyline points="14 2 14 8 20 8"/>
            <line x1="9" y1="13" x2="10" y2="14.5"/>
            <line x1="15" y1="13" x2="14" y2="14.5"/>
            <line x1="11" y1="17" x2="13" y2="17"/>
          </svg>
        </button>

        {tables.length > 0 && (
        <div className="flex-1 flex flex-col overflow-hidden ">
          <div className="flex-1 relative flex overflow-hidden">
            <div className="flex-1 relative diagram-container overflow-hidden">
              <Diagram
                tables={tables}
                selectedTables={selectedTables}
                onSelectTable={handleSelectTable}
                onAddColumn={addColumnToTable}
                onDeleteTable={deleteTable}
                onUpdateTable={handleZoomOrPos}
                onPositionsChange={handlePositionChange}
                positions={positions}
                zoom={zoom}
                layers={layers}
                categories={categories}
                tableCategory={tableCategory}
                linePaths={linePaths}
                onUpdateLinePath={handleLinePathChange}
                onResetLinePath={handleResetLinePath}
                onSaveLinePathState={handleSaveLinePathState}
                onUndoLinePath={handleUndoLinePath}
                onUpdateLayer={updateLayer}
                onRemoveLayer={removeLayer}
                onShowLayerPanel={setShowLayers}
                onShowCategoryPanel={setShowCategories}
                onUpdateRef={updateRef}
                multiDragMode={multiDragMode}
                onToggleMultiDrag={() => setMultiDragMode(m => !m)}
                onSelectTables={handleSelectTables}
                fitKey={sortFitKey}
                showLeft={showLeft}
              />
              {tables.length > 0 && showLayers && (
                <LayerPanel
                  layers={layers}
                  onAddLayer={addLayer}
                  onRemoveLayer={removeLayer}
                  onUpdateLayer={updateLayer}
                  onClose={() => setShowLayers(false)}
                />
              )}
              {tables.length > 0 && showCategories && (
                <CategoryPanel
                  categories={categories}
                  tables={tables}
                  tableCategory={tableCategory}
                  onAddCategory={addCategory}
                  onRemoveCategory={removeCategory}
                  onUpdateCategory={updateCategory}
                  onSetTableCategory={setTableCategoryId}
                  onClose={() => setShowCategories(false)}
                />
              )}
              {tables.length > 0 && showSortPanel && (
                <SortPanel
                  tables={tables}
                  categories={categories}
                  tableCategory={tableCategory}
                  onSort={handleSort}
                  onClose={() => setShowSortPanel(false)}
                />
              )}
            </div>

          </div>

          {Object.keys(selectedTables).length > 1 && (
            <div className="bg-[#21262d]/95 border-t border-[#30363d]/50 p-4 ">
              <p className="text-sm text-[#8b949e] text-center">{Object.keys(selectedTables).length} tablas seleccionadas</p>
            </div>
          )}
        </div>
        )}
      </div>
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);
  </script>
</body>
</html>
